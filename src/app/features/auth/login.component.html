<div class="flex flex-column align-items-center justify-content-center min-h-screen bg-gray-50 font-sans p-4">
  
  <!-- Logo & Tagline -->
  <div class="text-center mb-5">
    <div class="bg-indigo-100 text-primary border-round-xl flex align-items-center justify-content-center shadow-1 mx-auto mb-3" style="width: 56px; height: 56px;">
      <i class="pi pi-inbox text-3xl"></i>
    </div>
    <h1 class="text-3xl font-bold text-900 m-0 mb-2">StockFlow</h1>
    <p class="text-500 m-0 text-sm">Efficient inventory management for modern teams</p>
  </div>

  <!-- Login Card -->
  <div class="surface-card p-5 shadow-2 border-round-2xl w-full" style="max-width: 420px;">
    
    <div class="mb-5">
      <h2 class="text-2xl font-bold text-900 m-0 mb-2">Welcome back</h2>
      <p class="text-500 text-sm m-0">Please enter your details to sign in</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="flex flex-column gap-4">
      
      <div class="flex flex-column gap-2">
        <input pInputText id="email" formControlName="email" placeholder="Email address" class="w-full border-round-lg px-3 py-3" />
      </div>

      <div class="flex flex-column gap-2">
        <p-password formControlName="password" [toggleMask]="true" placeholder="Password" styleClass="w-full" inputStyleClass="w-full border-round-lg px-3 py-3" [feedback]="false"></p-password>
      </div>

      <div class="flex justify-content-end w-full">
        <a class="text-primary font-semibold text-sm cursor-pointer hover:underline text-decoration-none transition-colors">Forgot password?</a>
      </div>

      @if (authFacade.error()) {
        <p-message severity="error" [text]="authFacade.error()!" styleClass="w-full"></p-message>
      }

      <p-button 
        label="Sign in" 
        type="submit" 
        [disabled]="loginForm.invalid || authFacade.loading()"
        [loading]="authFacade.loading()"
        styleClass="w-full border-round-lg py-3 font-semibold text-lg bg-primary border-none shadow-1">
      </p-button>

      <p-divider align="center" styleClass="my-4">
          <span class="text-400 text-xs font-semibold uppercase tracking-widest">OR CONTINUE WITH</span>
      </p-divider>

      <p-button 
        label="Google account" 
        icon="pi pi-google" 
        [outlined]="true"
        severity="secondary"
        styleClass="w-full border-round-lg py-3 font-semibold text-600 surface-border hover:bg-gray-50 transition-colors">
      </p-button>

    </form>
  </div>

  <!-- Footer Links -->
  <div class="text-center mt-6">
    <p class="text-500 text-sm mb-4">
      Don't have an account? <a class="text-primary font-bold cursor-pointer hover:underline">Create Account</a>
    </p>
    <div class="flex gap-4 justify-content-center text-xs text-400 font-medium">
      <a class="cursor-pointer hover:text-600 transition-colors">Privacy Policy</a>
      <a class="cursor-pointer hover:text-600 transition-colors">Terms of Service</a>
      <a class="cursor-pointer hover:text-600 transition-colors">Help Center</a>
    </div>
  </div>

</div>
